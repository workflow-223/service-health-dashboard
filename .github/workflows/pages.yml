name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run build
        env:
          CI: false
          PUBLIC_URL: https://workflow-223.github.io/service-health-dashboard
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build
      - id: deployment
        uses: actions/deploy-pages@v4
