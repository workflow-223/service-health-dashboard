services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health-backend
    ports:
      - "3001:3001"
    volumes:
      - health-data:/app/data
    environment:
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  health-data:
